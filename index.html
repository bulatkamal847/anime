<!DOCTYPE html> 
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Rate Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>  
<body>

    <div class="container">
        <nav class="tabs-nav">
            <button class="tab-btn active" data-tab="mainTab">Главная</button>
            <button class="tab-btn" data-tab="top25Tab">Топ-25</button>
        </nav>

        <section id="mainTab" class="tab-content">
            
            <div class="seasons-archive-container">
                <div class="archive-header">
                    <h3>Топ сезонов</h3>
                    <div class="archive-actions">
                        <select id="archiveYearSelect" class="year-select">
                            </select>
                        <button id="clearSeasonsBtn" class="clear-btn season-danger-btn">Сбросить год</button>
                    </div>
                </div>
                
                <div class="seasons-grid">
                    <div class="season-card" data-season="winter">
                        <div class="season-title">Зима</div>
                        <div class="season-slots" id="slots-winter">
                            <p class="empty-text">Пусто</p>
                        </div>
                    </div>
                    <div class="season-card" data-season="spring">
                        <div class="season-title">Весна</div>
                        <div class="season-slots" id="slots-spring">
                            <p class="empty-text">Пусто</p>
                        </div>
                    </div>
                    <div class="season-card" data-season="summer">
                        <div class="season-title">Лето</div>
                        <div class="season-slots" id="slots-summer">
                            <p class="empty-text">Пусто</p>
                        </div>
                    </div>
                    <div class="season-card" data-season="autumn">
                        <div class="season-title">Осень</div>
                        <div class="season-slots" id="slots-autumn">
                            <p class="empty-text">Пусто</p>
                        </div>
                    </div>
                </div>
            </div>

            <hr class="section-divider">

            <div class="title-section">
                <label class="field-label">Название проекта</label>
                <div class="search-container">
                    <input type="text" id="titleInput" class="title-input" placeholder="Начните вводить название аниме..." autocomplete="off">
                    <div id="searchResults" class="search-results hidden"></div>
                </div>
            </div>

            <div class="main-grid">
                <div class="item">
                    <label>Сюжет</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="story">
                        <span id="storyVal">5</span>
                    </div>
                </div>
                <div class="item">
                    <label>Персонажи / Рисовка</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="chars">
                        <span id="charsVal">5</span>
                    </div>
                </div>
                <div class="item">
                    <label>Анимация</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="visual">
                        <span id="visualVal">5</span>
                    </div>
                </div>
                <div class="item">
                    <label>Музыка</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="music">
                        <span id="musicVal">5</span>
                    </div>
                </div>
                <div class="item">
                    <label>Оригинальность</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="originality">
                        <span id="originalityVal">5</span>
                    </div>
                </div>
                <div class="item">
                    <label>Финал</label>
                    <div class="range-row">
                        <input type="range" min="0" max="10" value="5" class="slider" id="ending">
                        <span id="endingVal">5</span>
                    </div>
                </div>
            </div>

            <div class="extra-card">
                <div class="item">
                    <label>Реализация</label>
                    <div class="range-row">
                        <input type="range" min="0" max="5" value="3" class="slider" id="real">
                        <span id="realVal">3</span>
                    </div>
                </div>
                <div class="item">
                    <label>Вайб / Атмосфера</label>
                    <div class="range-row">
                        <input type="range" min="0" max="5" value="3" class="slider" id="vibe">
                        <span id="vibeVal">3</span>
                    </div>
                </div>
            </div>

            <div class="season-select-section">
                <label class="field-label">Выберите сезон для этого аниме</label>
                <div class="season-toggle-group">
                    <button type="button" class="season-btn active" data-season="winter">Зима</button>
                    <button type="button" class="season-btn" data-season="spring">Весна</button>
                    <button type="button" class="season-btn" data-season="summer">Лето</button>
                    <button type="button" class="season-btn" data-season="autumn">Осень</button>
                </div>
            </div>

            <button id="calcBtn" class="primary-btn">Подсчитать и сохранить</button>

            <div id="resultArea" class="result-box hidden">
                <p>Итоговый результат:</p>
                <div id="totalScore">0</div>
            </div>

            <div class="history-container">
                <div class="history-header">
                    <h3>История оценок</h3>
                    <div class="history-actions">
                        <button id="exportBtn" class="export-btn">Сохранить JSON</button>
                        <button id="clearBtn" class="clear-btn">Очистить историю</button>
                    </div>
                </div>
                <div id="historyList" class="history-list"></div>
            </div>
        </section>

        <section id="top25Tab" class="tab-content hidden">
            <div class="top25-header">
                <h3>Зал Славы (Топ-25 лучших аниме)</h3>
                <button id="clearTopBtn" class="clear-btn danger-btn">Сбросить Топ-25</button>
            </div>
            <div id="top25List" class="top25-list">
                <p class="empty-text">Топ-25 пока пуст. Оценивайте аниме на Главной!</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
